[bar.default]
margin_edge = 1
start = [ "launcher", "wallpaper", "workspaces", "cpu" ]

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 0.0
    box_width = 0.0
    cx = 1920.0
    cy = 2037.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

[theme]
builtin = "Ayu"
wallpaper_scheme = "muted"

[wallpaper]
directory = "/home/sirjuls44/mavnezz-os/wallpapers"

    [wallpaper.default]
    path = "/home/sirjuls44/mavnezz-os/wallpapers/apollo.png"

    [wallpaper.last]
    path = "/home/sirjuls44/mavnezz-os/wallpapers/apollo.png"

    [wallpaper.monitors.HDMI-A-1]
    path = "/home/sirjuls44/mavnezz-os/wallpapers/apollo.png"